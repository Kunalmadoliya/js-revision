<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="" alt="" />
          <p>Github Finder</p>
        </div>

        <div class="theme-icon">
          <img src="" alt="" />
        </div>
      </div>
    </header>

    <main class="main">
      <!-- HERO -->
      <section class="hero">
        <h1>Find GitHub Users</h1>
        <p>Search for any GitHub user and explore their repositories</p>

        <div class="search-box">
          <input
            id="userInput"
            type="text"
            placeholder="Enter GitHub username..."
          />
          <button id="cta">Search</button>
        </div>
      </section>

      <!-- USER PROFILE -->
      <section class="profile-section">
        <div class="profile-card">
          <img
            class="avatar"
            id="avatar"
            src="https://i.pinimg.com/736x/9e/83/75/9e837528f01cf3f42119c5aeeed1b336.jpg"
            alt="User Avatar"
          />

          <div class="profile-info">
            <h3 id="userProfile">Username</h3>

            <p id="bio">Bio: User bio goes here...</p>
            <p id="loca">Location: User location goes here...</p>

            <div class="stats">
              <p class="repos">Repositories: 0</p>
              <p id="followers">Followers: 0</p>
              <p id="following">Following: 0</p>
            </div>
          </div>
        </div>
      </section>

      <!-- REPOSITORIES -->
      <section class="repo-section">
        <div class="repo-header">
          <h2 class="repos">Repositories : 0</h2>

          <input
            class="repo-search"
            type="text"
            placeholder="Search repositories..."
          />
        </div>

        <div id="repo-container"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
