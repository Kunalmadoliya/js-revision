<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App - Stay Organized</title>
   <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <h1>✓ Todo App</h1>
      <p class="subtitle">Organize your tasks efficiently</p>

      <div class="input-group">
        <input
          id="input"
          type="text"
          placeholder="Add a new task..."
          autocomplete="off"
        />
        <button id="cta">Add</button>
      </div>

      <ul id="ul">
        <li id="emptyState">📋 No tasks yet. Add one to get started!</li>
      </ul>
    </div>

    <script src="18-dom.js"></script>
  </body>
</html>
